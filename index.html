<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>'26 주님의교회 고난주간 특별집회</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      gap: 16px;
    }

    .card-container {
      position: relative;
      width: min(100vw, calc(75vh));
      height: min(75vh, calc(100vw * 1.33));
      max-width: 460px;
      flex-shrink: 0;
    }

    .card {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease;
      user-select: none;
    }

    .card.active { z-index: 10; transform: translateX(0);    opacity: 1; }
    .card.prev   { z-index: 5;  transform: translateX(-110%); opacity: 0; }
    .card.next   { z-index: 5;  transform: translateX(110%);  opacity: 0; }
    .card.hidden { z-index: 1;  transform: translateX(110%);  opacity: 0; }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .counter {
      position: absolute;
      top: -28px;
      right: 0;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* 하단 컨트롤: 화살표 + 인디케이터 — 이미지 밖 */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .arrow {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }
    .arrow:hover  { background: rgba(255,255,255,0.3); }
    .arrow:active { background: rgba(255,255,255,0.4); transform: scale(0.93); }

    .indicator {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 240px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
      cursor: pointer;
      flex-shrink: 0;
    }
    .dot.active {
      background: #fff;
      width: 20px;
      border-radius: 4px;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
      animation: fadeHint 3.5s ease forwards;
    }
    @keyframes fadeHint {
      0%   { opacity: 1; }
      65%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="viewer">

  <div class="card-container" id="cardContainer">
    <div class="counter" id="counter">1 / 17</div>

    <div class="card active" id="card-0"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_002.jpeg" alt="슬라이드 1"  loading="eager" /></div>
    <div class="card next"   id="card-1"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_003.jpeg" alt="슬라이드 2"  loading="lazy" /></div>
    <div class="card hidden" id="card-2"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_004.jpeg" alt="슬라이드 3"  loading="lazy" /></div>
    <div class="card hidden" id="card-3"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_005.jpeg" alt="슬라이드 4"  loading="lazy" /></div>
    <div class="card hidden" id="card-4"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_006.jpeg" alt="슬라이드 5"  loading="lazy" /></div>
    <div class="card hidden" id="card-5"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_007.jpeg" alt="슬라이드 6"  loading="lazy" /></div>
    <div class="card hidden" id="card-6"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_008.jpeg" alt="슬라이드 7"  loading="lazy" /></div>
    <div class="card hidden" id="card-7"><img src="KakaoTalk_Photo_2026-03-30-23-22-26_009.jpeg" alt="슬라이드 8"  loading="lazy" /></div>
    <div class="card hidden" id="card-8"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_010.jpeg" alt="슬라이드 9"  loading="lazy" /></div>
    <div class="card hidden" id="card-9"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_011.jpeg" alt="슬라이드 10" loading="lazy" /></div>
    <div class="card hidden" id="card-10"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_012.jpeg" alt="슬라이드 11" loading="lazy" /></div>
    <div class="card hidden" id="card-11"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_013.jpeg" alt="슬라이드 12" loading="lazy" /></div>
    <div class="card hidden" id="card-12"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_014.jpeg" alt="슬라이드 13" loading="lazy" /></div>
    <div class="card hidden" id="card-13"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_015.jpeg" alt="슬라이드 14" loading="lazy" /></div>
    <div class="card hidden" id="card-14"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_016.jpeg" alt="슬라이드 15" loading="lazy" /></div>
    <div class="card hidden" id="card-15"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_017.jpeg" alt="슬라이드 16" loading="lazy" /></div>
    <div class="card hidden" id="card-16"><img src="KakaoTalk_Photo_2026-03-30-23-22-27_018.jpeg" alt="슬라이드 17" loading="lazy" /></div>
   </div>

  <!-- 화살표 + 인디케이터 — 이미지 아래 -->
  <div class="controls">
    <button class="arrow" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
    <div class="indicator" id="indicator"></div>
    <button class="arrow" id="btnNext" onclick="navigate(1)">&#8594;</button>
  </div>

</div>

<div class="hint" id="hint">← 스와이프하거나 화살표로 넘기세요 →</div>

<script>
  const TOTAL = 17;
  let current = 0;
  let startX = 0;
  let isDragging = false;
  let dragDelta = 0;

  const cards = Array.from({length: TOTAL}, (_, i) => document.getElementById('card-' + i));
  const counter = document.getElementById('counter');
  const indicator = document.getElementById('indicator');

  // 인디케이터 생성
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    indicator.appendChild(dot);
  }

  function updateClasses() {
    const prev = (current - 1 + TOTAL) % TOTAL;
    const next = (current + 1) % TOTAL;

    cards.forEach((card, i) => {
      card.className = 'card';
      if (i === current) card.classList.add('active');
      else if (i === prev)    card.classList.add('prev');
      else if (i === next)    card.classList.add('next');
      else                    card.classList.add('hidden');
    });

    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.className = 'dot' + (i === current ? ' active' : '');
    });

    counter.textContent = (current + 1) + ' / ' + TOTAL;
  }

  function goTo(idx) {
    current = (idx + TOTAL) % TOTAL;  // 순환
    updateClasses();
  }

  function navigate(dir) {
    goTo(current + dir);
  }

  // 터치 스와이프
  const container = document.getElementById('cardContainer');

  container.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragDelta = e.touches[0].clientX - startX;
  }, { passive: true });

  container.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragDelta < -50)      navigate(1);
    else if (dragDelta > 50)  navigate(-1);
    dragDelta = 0;
  });

  // 마우스 드래그
  container.addEventListener('mousedown', e => {
    startX = e.clientX;
    isDragging = true;
    container.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    dragDelta = e.clientX - startX;
  });
  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    container.style.cursor = 'default';
    if (dragDelta < -50)      navigate(1);
    else if (dragDelta > 50)  navigate(-1);
    dragDelta = 0;
  });

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  setTimeout(() => {
    const hint = document.getElementById('hint');
    if (hint) hint.style.display = 'none';
  }, 4000);

  updateClasses();
</script>
</body>
</html>
