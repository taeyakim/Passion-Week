<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2026 고난주간 특별집회</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-container {
      position: relative;
      width: min(100vw, calc(100vh * 0.75));
      height: min(100vh, calc(100vw * 1.33));
      max-width: 480px;
      max-height: 640px;
    }

    .card {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease;
      user-select: none;
      cursor: grab;
    }

    .card.active { z-index: 10; transform: translateX(0); opacity: 1; }
    .card.prev   { z-index: 5;  transform: translateX(-110%); opacity: 0; }
    .card.next   { z-index: 5;  transform: translateX(110%); opacity: 0; }
    .card.hidden { z-index: 1;  transform: translateX(110%); opacity: 0; }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* 좌우 화살표 버튼 */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      color: white;
      font-size: 20px;
    }
    .arrow:hover { background: rgba(255,255,255,0.3); }
    .arrow.left  { left: -54px; }
    .arrow.right { right: -54px; }

    /* 모바일에서는 화살표 카드 안쪽으로 */
    @media (max-width: 600px) {
      .arrow.left  { left: 8px; }
      .arrow.right { right: 8px; }
    }

    /* 하단 인디케이터 */
    .indicator {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
      cursor: pointer;
    }
    .dot.active {
      background: #fff;
      width: 20px;
      border-radius: 4px;
    }

    /* 페이지 카운터 */
    .counter {
      position: absolute;
      top: -32px;
      right: 0;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* 스와이프 힌트 */
    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      pointer-events: none;
      animation: fadeHint 3s ease forwards;
    }
    @keyframes fadeHint {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="viewer">
  <div class="card-container" id="cardContainer">

    <div class="counter" id="counter">1 / 18</div>

    <!-- 카드들 -->
    <div class="card active" id="card-0"><img src="KakaoTalk_Photo_2026-03-30-23-22-25 001.jpeg" alt="슬라이드 1" loading="eager" /></div>
    <div class="card next"   id="card-1"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 002.jpeg" alt="슬라이드 2" loading="lazy" /></div>
    <div class="card hidden" id="card-2"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 003.jpeg" alt="슬라이드 3" loading="lazy" /></div>
    <div class="card hidden" id="card-3"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 004.jpeg" alt="슬라이드 4" loading="lazy" /></div>
    <div class="card hidden" id="card-4"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 005.jpeg" alt="슬라이드 5" loading="lazy" /></div>
    <div class="card hidden" id="card-5"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 006.jpeg" alt="슬라이드 6" loading="lazy" /></div>
    <div class="card hidden" id="card-6"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 007.jpeg" alt="슬라이드 7" loading="lazy" /></div>
    <div class="card hidden" id="card-7"><img src="KakaoTalk_Photo_2026-03-30-23-22-26 008.jpeg" alt="슬라이드 8" loading="lazy" /></div>
    <div class="card hidden" id="card-8"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 009.jpeg" alt="슬라이드 9" loading="lazy" /></div>
    <div class="card hidden" id="card-9"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 010.jpeg" alt="슬라이드 10" loading="lazy" /></div>
    <div class="card hidden" id="card-10"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 011.jpeg" alt="슬라이드 11" loading="lazy" /></div>
    <div class="card hidden" id="card-11"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 012.jpeg" alt="슬라이드 12" loading="lazy" /></div>
    <div class="card hidden" id="card-12"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 013.jpeg" alt="슬라이드 13" loading="lazy" /></div>
    <div class="card hidden" id="card-13"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 014.jpeg" alt="슬라이드 14" loading="lazy" /></div>
    <div class="card hidden" id="card-14"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 015.jpeg" alt="슬라이드 15" loading="lazy" /></div>
    <div class="card hidden" id="card-15"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 016.jpeg" alt="슬라이드 16" loading="lazy" /></div>
    <div class="card hidden" id="card-16"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 017.jpeg" alt="슬라이드 17" loading="lazy" /></div>
    <div class="card hidden" id="card-17"><img src="KakaoTalk_Photo_2026-03-30-23-22-27 018.jpeg" alt="슬라이드 18" loading="lazy" /></div>

    <!-- 좌우 화살표 -->
    <button class="arrow left"  id="btnPrev" onclick="navigate(-1)">&#8592;</button>
    <button class="arrow right" id="btnNext" onclick="navigate(1)">&#8594;</button>

    <!-- 인디케이터 -->
    <div class="indicator" id="indicator"></div>
  </div>
</div>

<div class="hint" id="hint">← 스와이프하거나 화살표로 넘기세요 →</div>

<script>
  const TOTAL = 18;
  let current = 0;
  let startX = 0;
  let isDragging = false;
  let dragDelta = 0;

  const cards = Array.from({length: TOTAL}, (_, i) => document.getElementById('card-' + i));
  const counter = document.getElementById('counter');
  const indicator = document.getElementById('indicator');

  // 인디케이터 생성
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    indicator.appendChild(dot);
  }

  function updateClasses() {
    cards.forEach((card, i) => {
      card.className = 'card';
      if (i === current) card.classList.add('active');
      else if (i === current - 1) card.classList.add('prev');
      else if (i === current + 1) card.classList.add('next');
      else card.classList.add('hidden');
    });

    // 인디케이터
    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.className = 'dot' + (i === current ? ' active' : '');
    });

    counter.textContent = (current + 1) + ' / ' + TOTAL;

    document.getElementById('btnPrev').style.opacity = current === 0 ? '0.2' : '1';
    document.getElementById('btnNext').style.opacity = current === TOTAL - 1 ? '0.2' : '1';
  }

  function goTo(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    current = idx;
    updateClasses();
  }

  function navigate(dir) {
    goTo(current + dir);
  }

  // 터치 스와이프
  const container = document.getElementById('cardContainer');

  container.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragDelta = e.touches[0].clientX - startX;
  }, { passive: true });

  container.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragDelta < -50) navigate(1);
    else if (dragDelta > 50) navigate(-1);
    dragDelta = 0;
  });

  // 마우스 드래그
  container.addEventListener('mousedown', e => {
    startX = e.clientX;
    isDragging = true;
    container.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    dragDelta = e.clientX - startX;
  });
  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    container.style.cursor = 'grab';
    if (dragDelta < -50) navigate(1);
    else if (dragDelta > 50) navigate(-1);
    dragDelta = 0;
  });

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // 힌트 자동 숨기기
  setTimeout(() => {
    const hint = document.getElementById('hint');
    if (hint) hint.style.display = 'none';
  }, 3500);

  updateClasses();
</script>
</body>
</html>
