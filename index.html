<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>'26 주님의교회 고난주간 특별집회</title>

  <!-- ▼ 카카오톡 링크 미리보기 설정 -->
  <!-- thumbnail.jpeg 파일을 매일 최신 이미지로 덮어쓰면 미리보기가 자동으로 바뀝니다 -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="'26 주님의교회 고난주간 특별집회" />
  <meta property="og:description" content="십자가 앞에 서다" />
  <meta property="og:image"       content="https://taeyakim.github.io/Passion-Week/thumbnail.jpeg" />
  <meta property="og:url"         content="https://taeyakim.github.io/Passion-Week/" />
  <!-- ▲ 카카오톡 링크 미리보기 설정 끝 -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .tabs-container {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 20;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: #fff;
      color: #111;
      font-weight: bold;
      border-color: #fff;
    }

    .viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      gap: 16px;
      padding-top: 70px;
    }

    .card-container {
      position: relative;
      width: min(100vw, calc(75vh));
      height: min(75vh, calc(100vw * 1.33));
      max-width: 460px;
      flex-shrink: 0;
    }

    .card {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease;
      user-select: none;
    }

    .card.active { z-index: 10; transform: translateX(0);    opacity: 1; }
    .card.prev   { z-index: 5;  transform: translateX(-110%); opacity: 0; }
    .card.next   { z-index: 5;  transform: translateX(110%);  opacity: 0; }
    .card.hidden { z-index: 1;  transform: translateX(110%);  opacity: 0; }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .counter {
      position: absolute;
      top: -24px;
      right: 0;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .arrow {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }
    .arrow:hover  { background: rgba(255,255,255,0.3); }
    .arrow:active { background: rgba(255,255,255,0.4); transform: scale(0.93); }

    .indicator {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      max-width: 240px;
      flex-wrap: wrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
      cursor: pointer;
      flex-shrink: 0;
    }
    .dot.active {
      background: #fff;
      width: 20px;
      border-radius: 4px;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
      animation: fadeHint 3.5s ease forwards;
    }
    @keyframes fadeHint {
      0%   { opacity: 1; }
      65%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="tabs-container" id="tabsContainer"></div>

<div class="viewer">
  <div class="card-container">
    <div class="counter" id="counter"></div>
    <div id="cardsWrapper"></div>
  </div>

  <div class="controls">
    <button class="arrow" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
    <div class="indicator" id="indicator"></div>
    <button class="arrow" id="btnNext" onclick="navigate(1)">&#8594;</button>
  </div>
</div>

<div class="hint" id="hint">← 스와이프하거나 화살표로 넘기세요 →</div>

<script>
  // ================================================================
  // 날짜별 이미지 데이터
  // 매일 집회 후 아래 패턴으로 객체 하나씩 추가하면 됩니다.
  //
  // 폴더 구조:
  //   index.html
  //   thumbnail.jpeg  ← 매일 최신 대표 이미지로 덮어쓰기 (카톡 미리보기용)
  //   day_1/  ← 1일차 이미지들
  //   day_2/  ← 2일차 이미지들
  //   day_3/  ← 3일차 이미지들 (추가 예정)
  //   ...
  // ================================================================
  const daysData = [

    // ── 1일차 ──────────────────────────────────────────────────────
    {
      title: "1일 차",
      images: [
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_002.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_003.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_004.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_005.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_006.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_007.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-26_008.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_009.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_010.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_011.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_012.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_013.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_014.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_015.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_016.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_017.jpeg",
        "day_1/KakaoTalk_Photo_2026-03-30-23-22-27_018.jpeg",
      ]
    },

    // ── 2일차 ──────────────────────────────────────────────────────
    {
      title: "2일 차",
      images: [
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_002.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_003.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_004.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_005.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_006.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_007.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_008.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_009.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_010.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_011.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_012.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_013.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_014.jpeg",
        "day_2/KakaoTalk_Photo_2026-03-31-23-09-23_015.jpeg",
      ]
    },

    // ── 3일차 (추가 예정) ──────────────────────────────────────────
    {
      title: "3일 차",
      images: [
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_002.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_003.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_004.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_005.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_006.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_007.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_008.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_009.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_010.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_011.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_012.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_013.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_014.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_015.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_016.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_017.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_018.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_019.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_020.jpeg",
        "day_3/KakaoTalk_Photo_2026-04-01-23-25-15_021.jpeg",  
     ]
    },

    // ── 4일차 (추가 예정) ──────────────────────────────────────────
    // {
    //   title: "4일 차",
    //   images: [
    //     "day_4/KakaoTalk_Photo_XXXX_001.jpeg",
    //   ]
    // },

    // ── 5일차 (추가 예정) ──────────────────────────────────────────
    // {
    //   title: "5일 차",
    //   images: [
    //     "day_5/KakaoTalk_Photo_XXXX_001.jpeg",
    //   ]
    // },

  ];

  // ================================================================
  // 이하 로직은 수정 불필요
  // ================================================================
  let currentDayIndex = daysData.length - 1;
  let currentCardIndex = 0;
  let cards = [];
  let totalCards = 0;

  const tabsContainer = document.getElementById('tabsContainer');
  const cardsWrapper  = document.getElementById('cardsWrapper');
  const counter       = document.getElementById('counter');
  const indicator     = document.getElementById('indicator');

  function renderTabs() {
    tabsContainer.innerHTML = '';
    daysData.forEach((day, index) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (index === currentDayIndex ? ' active' : '');
      btn.textContent = day.title;
      btn.onclick = () => loadDay(index);
      tabsContainer.appendChild(btn);
    });
  }

  function loadDay(dayIndex) {
    currentDayIndex = dayIndex;
    currentCardIndex = 0;
    const dayImages = daysData[dayIndex].images;
    totalCards = dayImages.length;

    document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
      btn.className = 'tab-btn' + (idx === currentDayIndex ? ' active' : '');
    });

    cardsWrapper.innerHTML = '';
    indicator.innerHTML = '';
    cards = [];

    dayImages.forEach((src, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      const img = document.createElement('img');
      img.src = src;
      img.alt = `슬라이드 ${i + 1}`;
      img.loading = i === 0 ? "eager" : "lazy";
      card.appendChild(img);
      cardsWrapper.appendChild(card);
      cards.push(card);

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.onclick = () => goTo(i);
      indicator.appendChild(dot);
    });

    updateClasses();
  }

  function updateClasses() {
    if (totalCards === 0) return;
    const prev = (currentCardIndex - 1 + totalCards) % totalCards;
    const next = (currentCardIndex + 1) % totalCards;

    cards.forEach((card, i) => {
      card.className = 'card';
      if (i === currentCardIndex) card.classList.add('active');
      else if (i === prev)        card.classList.add('prev');
      else if (i === next)        card.classList.add('next');
      else                        card.classList.add('hidden');
    });

    Array.from(indicator.children).forEach((dot, i) => {
      dot.className = 'dot' + (i === currentCardIndex ? ' active' : '');
    });

    counter.textContent = (currentCardIndex + 1) + ' / ' + totalCards;
  }

  function goTo(idx) {
    currentCardIndex = (idx + totalCards) % totalCards;
    updateClasses();
  }

  function navigate(dir) {
    goTo(currentCardIndex + dir);
  }

  // 터치 스와이프
  let startX = 0, isDragging = false, dragDelta = 0;
  const swipeContainer = document.querySelector('.card-container');

  swipeContainer.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  swipeContainer.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragDelta = e.touches[0].clientX - startX;
  }, { passive: true });

  swipeContainer.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragDelta < -50)      navigate(1);
    else if (dragDelta > 50)  navigate(-1);
    dragDelta = 0;
  });

  // 마우스 드래그
  swipeContainer.addEventListener('mousedown', e => {
    startX = e.clientX;
    isDragging = true;
    swipeContainer.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    dragDelta = e.clientX - startX;
  });
  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    swipeContainer.style.cursor = 'default';
    if (dragDelta < -50)      navigate(1);
    else if (dragDelta > 50)  navigate(-1);
    dragDelta = 0;
  });

  // 키보드
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // 초기 실행
  renderTabs();
  loadDay(currentDayIndex);
</script>
</body>
</html>
